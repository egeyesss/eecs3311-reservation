name: EECS 3311 CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # We use homebrew JDK 25 for this
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: maven

      - name: Run Tests, JaCoCo, and PIT
        run: mvn clean test jacoco:report pitest:mutationCoverage

      # Save the JaCoCo report as a downloadable artifact for the TAs
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

      # Save the PIT Mutation report as a downloadable artifact for the TAs
      - name: Upload PIT Mutation Report
        uses: actions/upload-artifact@v4
        with:
          name: pit-mutation-report
          path: target/pit-reports/